{% extends "base_menu.html" %}
{% load static %}


{% block content %}
{% if user.is_staff %}

{% else %}
<div class="container">
    <h1 id="page-heading" class="pb-2">Choose a quiz</h1>

    <div id="msg" class="text-danger fw-bold fs-5 px-5"></div>

    <div id="quiz-form" class="card bg-light mb-3" style="width:26rem" hidden="true" value="start" >
        <div class="bg-image hover-overlay" data-mbd-ripple-init data-mdb-ripple-color="light">
            <img id="flag" class="card-img-top" hidden="false" src="" alt="guess">
            <p id="hint" hidden="true"></p>
        </div>
        
        <div class="card-body p-3">
            <form action="" class="row">
                <h3 id="feedback" class="fw-bold" hidden="true"></h3>
                <div class="col-9">
                    <input id="answer" class="form-control" hidden="true" type="text" 
                        name="answer" placeholder="Enter country" value="" autofocus >
                </div>
                <div class="col-3">
                    <input id="start" class="btn btn-success form-control"
                    type="button" value="Start">
                    <input id="submit" class="btn btn-success form-control" hidden="true"
                    type="button" value="Submit">
                    <input id="next" class="btn btn-success form-control" hidden="true"
                    type="button" value="Next">
                </div>       
            </form>
        </div>
        
    </div>
</div>
{% endif %}
{% endblock %}


{% block script %}
{% if user.is_staff %}

{% else %}
    <script src="{% static 'flags.js' %}"></script>
{% endif %}
{% endblock %}
